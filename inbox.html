<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inbox – AutoPro.ba</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,.07);--accent:#e8a020;--accent2:#ff6b35;--text:#f0f2f7;--muted:#7a8299;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(13,15,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--text);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;gap:10px;align-items:center;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:8px;font-size:.87rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;font-size:.87rem;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-primary:hover{opacity:.9;}

.inbox-layout{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden;}

/* THREAD LIST */
.thread-list{border-right:1px solid var(--border);display:flex;flex-direction:column;animation:slideIn .4s ease both;overflow:hidden;}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}

.thread-search{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.thread-search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0 12px;transition:border-color .3s;}
.thread-search-wrap:focus-within{border-color:var(--accent);}
.thread-search-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;padding:10px 0;flex:1;}
.thread-search-wrap input::placeholder{color:var(--muted);}

.thread-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.thread-tab{flex:1;padding:12px;text-align:center;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Syne',sans-serif;letter-spacing:.03em;position:relative;bottom:-1px;}
.thread-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.threads{overflow-y:auto;flex:1;}
.threads::-webkit-scrollbar{width:4px;}
.threads::-webkit-scrollbar-track{background:transparent;}
.threads::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.thread{display:flex;gap:12px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;position:relative;opacity:0;transform:translateX(-12px);transition:opacity .4s ease, transform .4s ease, background .2s;}
.thread.visible{opacity:1;transform:translateX(0);}
.thread:hover,.thread.active{background:var(--surface2);}
.thread.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--accent),var(--accent2));border-radius:0 2px 2px 0;}
.thread-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--surface2),#2a3050);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;position:relative;}
.thread-online{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--bg);}
.thread-info{flex:1;min-width:0;}
.thread-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.thread-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
.thread-time{font-size:.72rem;color:var(--muted);}
.thread-preview{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.thread-meta{display:flex;align-items:center;justify-content:space-between;}
.thread-service{font-size:.72rem;background:rgba(232,160,32,.1);color:var(--accent);padding:2px 8px;border-radius:100px;border:1px solid rgba(232,160,32,.2);}
.thread-unread{width:18px;height:18px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#000;font-family:'Syne',sans-serif;}

/* CHAT AREA */
.chat-area{display:flex;flex-direction:column;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chat-header-left{display:flex;align-items:center;gap:12px;}
.chat-avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--surface2),#2a3050);display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.chat-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;}
.chat-service{font-size:.78rem;color:var(--accent);}
.chat-status{font-size:.75rem;color:var(--green);display:flex;align-items:center;gap:4px;}
.online-dot{width:6px;height:6px;background:var(--green);border-radius:50;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 5px rgba(34,197,94,0);}}
.chat-actions{display:flex;gap:8px;}
.chat-action-btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--muted);font-size:.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.chat-action-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SERVICE CONTEXT BANNER */
.service-banner{margin:16px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.service-banner img{width:52px;height:40px;object-fit:cover;border-radius:8px;}
.service-banner-info{flex:1;}
.service-banner-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;margin-bottom:2px;}
.service-banner-price{font-size:.78rem;color:var(--accent);}
.service-banner-btn{padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;white-space:nowrap;}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:16px;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.msg-date{text-align:center;font-size:.72rem;color:var(--muted);padding:4px 0;}
.msg{display:flex;gap:10px;max-width:75%;animation:msgIn .3s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg.me{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.msg-content{display:flex;flex-direction:column;gap:4px;}
.bubble{padding:12px 16px;border-radius:14px;font-size:.9rem;line-height:1.55;}
.msg:not(.me) .bubble{background:var(--surface2);border:1px solid var(--border);border-top-left-radius:4px;}
.msg.me .bubble{background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(255,107,53,.15));border:1px solid rgba(232,160,32,.25);border-top-right-radius:4px;}
.msg-time{font-size:.68rem;color:var(--muted);padding:0 4px;}
.msg.me .msg-time{text-align:right;}

/* BOOKING CARD IN CHAT */
.booking-bubble{background:var(--surface);border:1px solid rgba(232,160,32,.25);border-radius:14px;padding:16px;max-width:320px;}
.booking-bubble-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:var(--accent);margin-bottom:10px;}
.booking-row{display:flex;justify-content:space-between;font-size:.82rem;padding:6px 0;border-bottom:1px solid var(--border);}
.booking-row:last-of-type{border-bottom:none;}
.booking-row .label{color:var(--muted);}
.confirm-btn{width:100%;margin-top:12px;padding:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;}

/* INPUT */
.chat-input-area{border-top:1px solid var(--border);padding:16px 24px;flex-shrink:0;}
.input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .3s;}
.input-wrap:focus-within{border-color:var(--accent);}
.chat-textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;resize:none;line-height:1.5;max-height:120px;padding:6px 0;}
.chat-textarea::placeholder{color:var(--muted);}
.input-actions{display:flex;align-items:center;gap:6px;padding-bottom:4px;}
.input-icon{width:32px;height:32px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;}
.input-icon:hover{background:var(--surface);color:var(--text);}
.send-btn{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#000;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.send-btn:hover{opacity:.85;transform:scale(1.05);}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">auto<span>pro</span>.ba</a>
  <div class="nav-right">
    <button class="btn-ghost" onclick="location.href='browse.html'">Browse</button>
    <button class="btn-ghost" onclick="location.href='profile.html'">Profile</button>
    <button class="btn-primary" onclick="location.href='post-service.html'">Post a service</button>
  </div>
</nav>

<div class="inbox-layout">
  <!-- THREAD LIST -->
  <div class="thread-list">
    <div class="thread-search">
      <div class="thread-search-wrap">
        <span style="color:var(--muted);font-size:.9rem">🔍</span>
        <input type="text" placeholder="Search messages…">
      </div>
    </div>
    <div class="thread-tabs">
      <div class="thread-tab active">All</div>
      <div class="thread-tab">Active</div>
      <div class="thread-tab">Completed</div>
    </div>
    <div class="threads" id="threads"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar">🔧</div>
        <div>
          <div class="chat-name">Adnan Kovač</div>
          <div class="chat-status"><div class="online-dot"></div> Online now</div>
        </div>
      </div>
      <div style="font-size:.78rem;color:var(--accent);font-family:'Syne',sans-serif;">Full Car Service</div>
      <div class="chat-actions">
        <button class="chat-action-btn">📋 View Listing</button>
        <button class="chat-action-btn">🗓 Schedule</button>
        <button class="chat-action-btn" style="border-color:rgba(232,160,32,.3);color:var(--accent);">✓ Confirm Booking</button>
      </div>
    </div>

    <div class="service-banner">
      <img src="https://images.unsplash.com/photo-1486006920555-c77dcf18193c?w=200&q=70" alt="">
      <div class="service-banner-info">
        <div class="service-banner-title">Full Car Service & Detailing – Basic</div>
        <div class="service-banner-price">45 KM · 2 hours · Oil change + inspection</div>
      </div>
      <button class="service-banner-btn" onclick="location.href='car-service.html'">View Service →</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="chat-input-area">
      <div class="input-wrap">
        <textarea class="chat-textarea" placeholder="Type a message…" rows="1" id="msgInput" onkeydown="sendMsg(event)"></textarea>
        <div class="input-actions">
          <button class="input-icon" title="Attach file">📎</button>
          <button class="input-icon" title="Emoji">😊</button>
          <button class="send-btn" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const threadData = [
  {name:'Adnan Kovač',icon:'🔧',preview:'Sure, I can do Saturday morning!',time:'2m',service:'Car Service',unread:2,online:true,active:true},
  {name:'Mirza Pejanović',icon:'🛞',preview:'The tyres are in stock, ready to go.',time:'1h',service:'Tyre Change',unread:1,online:true,active:false},
  {name:'AutoStar Workshop',icon:'⚡',preview:'Diagnostics done, sending report now.',time:'3h',service:'Diagnostics',unread:0,online:false,active:false},
  {name:'Kenan Detail',icon:'✨',preview:'Can you come by tomorrow at 10?',time:'Yesterday',service:'Detailing',unread:0,online:false,active:false},
  {name:'Haris AC Servis',icon:'❄️',preview:'The gas top-up is done ✓',time:'Mon',service:'AC Repair',unread:0,online:false,active:false},
  {name:'Džemal Autolimar',icon:'🎨',preview:'I sent the quote to your email.',time:'Sun',service:'Bodywork',unread:0,online:false,active:false},
];

const threads = document.getElementById('threads');
threadData.forEach((t,i) => {
  threads.innerHTML += `
  <div class="thread ${t.active?'active':''}" style="transition-delay:${i*60}ms">
    <div class="thread-avatar">${t.icon}${t.online?'<div class="thread-online"></div>':''}</div>
    <div class="thread-info">
      <div class="thread-top">
        <div class="thread-name">${t.name}</div>
        <div class="thread-time">${t.time}</div>
      </div>
      <div class="thread-preview">${t.preview}</div>
      <div class="thread-meta">
        <div class="thread-service">${t.service}</div>
        ${t.unread?`<div class="thread-unread">${t.unread}</div>`:''}
      </div>
    </div>
  </div>`;
});
setTimeout(()=>{document.querySelectorAll('.thread').forEach(el=>el.classList.add('visible'));},100);

// Conversation
const conversation = [
  {me:false,text:"Hello! I saw your listing for the full car service. I'm interested in the Basic package.",time:'09:14'},
  {me:true,text:'Hi! Great, I have availability this week. What kind of car do you have and what are the main issues?',time:'09:16'},
  {me:false,text:"It's a 2018 VW Golf, about 120k km. Mainly need oil change and general inspection. The engine warning light came on last week as well.",time:'09:18'},
  {me:true,text:"No problem — oil change and multi-point inspection is included in the Basic. I can also do a quick OBD scan for the warning light, usually takes 10 mins extra. I'd suggest adding that.",time:'09:20'},
  {me:false,text:'Perfect! How much would the OBD scan add to the total?',time:'09:21'},
  {me:true,text:'Just 15 KM on top, so 60 KM total. I can come to you or you can bring it to the workshop in Ilidža.',time:'09:22'},
  {me:false,text:'The workshop works for me. Can we do this Saturday around 10am?',time:'09:24'},
];

const booking = {
  service:'Full Car Service (Basic) + OBD Scan',
  date:'Saturday, 10 May 2026',
  time:'10:00 AM',
  location:'AutoPro Workshop, Ilidža',
  total:'60 KM'
};

const msgs = document.getElementById('messages');
msgs.innerHTML = `<div class="msg-date">Today, 09:14</div>`;
conversation.forEach((m, i) => {
  msgs.innerHTML += `
  <div class="msg ${m.me?'me':''}" style="animation-delay:${i*80}ms">
    ${!m.me?`<div class="msg-av">🔧</div>`:''}
    <div class="msg-content">
      <div class="bubble">${m.text}</div>
      <div class="msg-time">${m.time}</div>
    </div>
    ${m.me?`<div class="msg-av" style="background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(255,107,53,.15));border:1px solid rgba(232,160,32,.2);">👤</div>`:''}
  </div>`;
});
// booking card
msgs.innerHTML += `
<div class="msg" style="animation-delay:${conversation.length*80}ms">
  <div class="msg-av">🔧</div>
  <div class="msg-content">
    <div class="booking-bubble">
      <div class="booking-bubble-title">📋 Booking Summary</div>
      <div class="booking-row"><span class="label">Service</span><span>${booking.service}</span></div>
      <div class="booking-row"><span class="label">Date</span><span>${booking.date}</span></div>
      <div class="booking-row"><span class="label">Time</span><span>${booking.time}</span></div>
      <div class="booking-row"><span class="label">Location</span><span>${booking.location}</span></div>
      <div class="booking-row"><span class="label">Total</span><span style="color:var(--accent);font-weight:700;">${booking.total}</span></div>
      <button class="confirm-btn">✓ Confirm Booking</button>
    </div>
    <div class="msg-time">09:26</div>
  </div>
</div>`;

msgs.innerHTML += `
<div class="msg me" style="animation-delay:${(conversation.length+1)*80}ms">
  <div class="msg-content">
    <div class="bubble">Sure, I can do Saturday morning!</div>
    <div class="msg-time">09:28</div>
  </div>
  <div class="msg-av" style="background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(255,107,53,.15));border:1px solid rgba(232,160,32,.2);">👤</div>
</div>`;

msgs.scrollTop = msgs.scrollHeight;

function sendMsg(e) {
  if (e && e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); } else if (e) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  msgs.innerHTML += `
  <div class="msg me">
    <div class="msg-content">
      <div class="bubble">${text}</div>
      <div class="msg-time">Now</div>
    </div>
    <div class="msg-av" style="background:linear-gradient(135deg,rgba(232,160,32,.2),rgba(255,107,53,.15));border:1px solid rgba(232,160,32,.2);">👤</div>
  </div>`;
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
}

document.querySelectorAll('.thread-tab').forEach(tab => {
  tab.addEventListener('click', function(){ 
    document.querySelectorAll('.thread-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
