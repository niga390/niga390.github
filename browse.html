<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Services – AutoPro.ba</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#151820;--surface2:#1c2030;--border:rgba(255,255,255,.07);--accent:#e8a020;--accent2:#ff6b35;--text:#f0f2f7;--muted:#7a8299;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(13,15,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--text);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-right{display:flex;gap:10px;align-items:center;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:8px;font-size:.87rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-weight:700;font-size:.87rem;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}

/* SEARCH HEADER */
.browse-header{padding:32px 40px 0;animation:fadeUp .5s ease both;}
.browse-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:20px;}
.browse-title span{color:var(--muted);font-size:1rem;font-weight:400;font-family:'DM Sans',sans-serif;margin-left:10px;}

.search-row{display:flex;gap:10px;margin-bottom:20px;}
.search-input-wrap{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 16px;transition:border-color .3s;}
.search-input-wrap:focus-within{border-color:var(--accent);}
.search-input-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;padding:13px 0;flex:1;}
.search-input-wrap input::placeholder{color:var(--muted);}
.filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.87rem;padding:13px 16px;border-radius:10px;outline:none;cursor:pointer;min-width:150px;transition:border-color .2s;}
.filter-select:hover{border-color:var(--accent);}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:13px 18px;border-radius:10px;font-size:.87rem;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;transition:all .2s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.06);}

/* FILTER PILLS */
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border);}
.pill{padding:7px 14px;border-radius:100px;border:1px solid var(--border);font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s;background:var(--surface);}
.pill:hover,.pill.active{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.07);}
.pill.active{font-weight:600;}

/* LAYOUT */
.browse-layout{display:grid;grid-template-columns:280px 1fr;gap:0;min-height:calc(100vh - 64px);}

/* SIDEBAR */
.filter-sidebar{border-right:1px solid var(--border);padding:28px 24px;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;animation:slideIn .4s ease both;}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
.filter-group{margin-bottom:28px;}
.filter-group h4{font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;}
.filter-option{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .2s;font-size:.88rem;}
.filter-option:hover{background:var(--surface2);}
.filter-option input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;}
.filter-count{font-size:.75rem;color:var(--muted);}
.price-range{margin-top:8px;}
.range-row{display:flex;gap:8px;}
.range-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:.85rem;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color .2s;}
.range-input:focus{border-color:var(--accent);}
.sort-option{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .2s;font-size:.88rem;}
.sort-option:hover,.sort-option.active{background:var(--surface2);}
.sort-option input{accent-color:var(--accent);}
.sidebar-apply{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;margin-top:8px;}
.sidebar-apply:hover{opacity:.9;}

/* RESULTS */
.results-area{padding:28px 32px;}
.results-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;animation:fadeUp .4s ease both;}
.results-count{font-size:.9rem;color:var(--muted);}
.results-count strong{color:var(--text);}
.view-toggle{display:flex;gap:4px;}
.view-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:7px;background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s;}
.view-btn.active,.view-btn:hover{border-color:var(--accent);color:var(--accent);}

/* GRID VIEW */
.results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.r-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s;opacity:0;transform:translateY(16px);}
.r-card.visible{opacity:1;transform:translateY(0);}
.r-card:hover{border-color:rgba(232,160,32,.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5);}
.r-img-wrap{position:relative;overflow:hidden;}
.r-img{width:100%;height:160px;object-fit:cover;display:block;transition:transform .4s;}
.r-card:hover .r-img{transform:scale(1.05);}
.r-badge{position:absolute;top:10px;left:10px;background:rgba(13,15,20,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:.72rem;color:var(--accent);font-family:'Syne',sans-serif;font-weight:600;}
.r-body{padding:16px;}
.r-cat{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.r-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:8px;line-height:1.3;}
.r-row{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:10px;}
.r-rating{color:var(--accent);}
.r-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);}
.r-price{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;}
.r-price small{font-size:.72rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;}
.r-avail{font-size:.72rem;color:var(--green);display:flex;align-items:center;gap:4px;}
.avail-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 6px rgba(34,197,94,0);}}

/* PAGINATION */
.pagination{display:flex;gap:8px;justify-content:center;margin-top:40px;animation:fadeUp .4s ease both;}
.page-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:'Syne',sans-serif;}
.page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(232,160,32,.07);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">auto<span>pro</span>.ba</a>
  <div class="nav-right">
    <button class="btn-ghost" onclick="location.href='inbox.html'">Inbox</button>
    <button class="btn-ghost" onclick="location.href='profile.html'">Profile</button>
    <button class="btn-primary" onclick="location.href='post-service.html'">Post a service</button>
  </div>
</nav>

<div style="padding:24px 40px 0;animation:fadeUp .4s ease both;">
  <div class="browse-title">Browse Services <span>312 results</span></div>
  <div class="search-row">
    <div class="search-input-wrap">
      <span style="color:var(--muted)">🔍</span>
      <input type="text" placeholder="Search by service, location or keyword…" id="searchInput">
    </div>
    <select class="filter-select" id="locFilter">
      <option value="">📍 All Locations</option>
      <option>Sarajevo</option>
      <option>Ilidža</option>
      <option>Novo Sarajevo</option>
      <option>Centar</option>
      <option>Hadžići</option>
    </select>
    <select class="filter-select" id="sortFilter">
      <option>Sort: Relevance</option>
      <option>Sort: Price ↑</option>
      <option>Sort: Price ↓</option>
      <option>Sort: Rating</option>
      <option>Sort: Newest</option>
    </select>
  </div>
  <div class="filter-pills">
    <div class="pill active" onclick="togglePill(this)">All</div>
    <div class="pill" onclick="togglePill(this)">🔧 Mechanical</div>
    <div class="pill" onclick="togglePill(this)">✨ Detailing</div>
    <div class="pill" onclick="togglePill(this)">🛞 Tyres</div>
    <div class="pill" onclick="togglePill(this)">⚡ Electrics</div>
    <div class="pill" onclick="togglePill(this)">❄️ AC & Cooling</div>
    <div class="pill" onclick="togglePill(this)">🎨 Paint & Body</div>
    <div class="pill" onclick="togglePill(this)">🔋 Battery</div>
    <div class="pill" onclick="togglePill(this)">🚗 Diagnostics</div>
    <div class="pill" onclick="togglePill(this)">⭐ Top Rated</div>
    <div class="pill" onclick="togglePill(this)">🟢 Available Now</div>
  </div>
</div>

<div class="browse-layout">
  <!-- SIDEBAR -->
  <div class="filter-sidebar">
    <div class="filter-group">
      <h4>Category</h4>
      <label class="filter-option"><span>Engine & Mechanical</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">84</span><input type="checkbox" checked></div></label>
      <label class="filter-option"><span>Detailing & Wash</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">63</span><input type="checkbox"></div></label>
      <label class="filter-option"><span>Tyres & Alignment</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">47</span><input type="checkbox"></div></label>
      <label class="filter-option"><span>Auto Electrics</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">52</span><input type="checkbox"></div></label>
      <label class="filter-option"><span>Paint & Bodywork</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">38</span><input type="checkbox"></div></label>
      <label class="filter-option"><span>AC & Cooling</span><div style="display:flex;align-items:center;gap:8px;"><span class="filter-count">29</span><input type="checkbox"></div></label>
    </div>

    <div class="filter-group">
      <h4>Price Range (KM)</h4>
      <div class="price-range">
        <div class="range-row">
          <input class="range-input" type="number" placeholder="Min" value="0">
          <input class="range-input" type="number" placeholder="Max" value="500">
        </div>
      </div>
    </div>

    <div class="filter-group">
      <h4>Rating</h4>
      <label class="filter-option"><span>⭐⭐⭐⭐⭐ 5.0</span><input type="checkbox"></label>
      <label class="filter-option"><span>⭐⭐⭐⭐ 4.0+</span><input type="checkbox" checked></label>
      <label class="filter-option"><span>⭐⭐⭐ 3.0+</span><input type="checkbox"></label>
    </div>

    <div class="filter-group">
      <h4>Availability</h4>
      <label class="filter-option"><span>Available now</span><input type="checkbox" checked></label>
      <label class="filter-option"><span>Available today</span><input type="checkbox"></label>
      <label class="filter-option"><span>Mobile service</span><input type="checkbox"></label>
    </div>

    <div class="filter-group">
      <h4>Service Type</h4>
      <label class="sort-option"><input type="radio" name="stype" checked> At workshop</label>
      <label class="sort-option"><input type="radio" name="stype"> Mobile (at you)</label>
      <label class="sort-option"><input type="radio" name="stype"> Both</label>
    </div>

    <button class="sidebar-apply">Apply Filters</button>
  </div>

  <!-- RESULTS -->
  <div class="results-area">
    <div class="results-meta">
      <div class="results-count"><strong>312</strong> services found</div>
      <div class="view-toggle">
        <button class="view-btn active" title="Grid view">⊞</button>
        <button class="view-btn" title="List view">≡</button>
      </div>
    </div>

    <div class="results-grid" id="resultsGrid">
      <!-- Cards injected by JS -->
    </div>

    <div class="pagination">
      <button class="page-btn">‹</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">…</button>
      <button class="page-btn">12</button>
      <button class="page-btn">›</button>
    </div>
  </div>
</div>

<script>
const cards = [
  {title:'Full Car Service & Detailing',cat:'Engine & Mechanical',loc:'Sarajevo Canton',rating:'4.9',reviews:38,price:'45',unit:'session',badge:'⭐ Top Rated',img:'https://images.unsplash.com/photo-1486006920555-c77dcf18193c?w=400&q=70',avail:true},
  {title:'Mobile Tyre Change & Balancing',cat:'Tyres & Alignment',loc:'Ilidža',rating:'4.8',reviews:22,price:'30',unit:'tyre',badge:'🔥 Popular',img:'https://images.unsplash.com/photo-1625047509168-a7026f36de04?w=400&q=70',avail:true},
  {title:'Engine Diagnostics & OBD Scan',cat:'Diagnostics',loc:'Novo Sarajevo',rating:'5.0',reviews:14,price:'25',unit:'scan',badge:'✅ Verified',img:'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400&q=70',avail:true},
  {title:'Exterior Ceramic Coating',cat:'Detailing & Wash',loc:'Centar',rating:'4.7',reviews:31,price:'180',unit:'full car',badge:'✨ Premium',img:'https://images.unsplash.com/photo-1601362840469-51e4d8d58785?w=400&q=70',avail:false},
  {title:'AC Recharge & System Check',cat:'AC & Cooling',loc:'Hadžići',rating:'4.6',reviews:19,price:'55',unit:'service',badge:'❄️ Specialist',img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=70',avail:true},
  {title:'Brake Pad & Disc Replacement',cat:'Engine & Mechanical',loc:'Vogošća',rating:'4.9',reviews:44,price:'70',unit:'axle',badge:'🔧 Expert',img:'https://images.unsplash.com/photo-1614026480209-cd9934144671?w=400&q=70',avail:true},
  {title:'Auto Electrical & Wiring',cat:'Auto Electrics',loc:'Ilidža',rating:'4.5',reviews:11,price:'40',unit:'hour',badge:'⚡ Electrics',img:'https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=400&q=70',avail:false},
  {title:'Full Interior Detailing',cat:'Detailing & Wash',loc:'Sarajevo',rating:'4.8',reviews:27,price:'80',unit:'car',badge:'✨ Detail',img:'https://images.unsplash.com/photo-1607860108855-64acf2078ed9?w=400&q=70',avail:true},
  {title:'Windshield Replacement',cat:'Paint & Bodywork',loc:'Novo Sarajevo',rating:'4.7',reviews:9,price:'120',unit:'glass',badge:'🪟 Glass',img:'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=400&q=70',avail:true},
];

const grid = document.getElementById('resultsGrid');
cards.forEach((c, i) => {
  grid.innerHTML += `
  <div class="r-card" onclick="location.href='car-service.html'" style="transition-delay:${i*60}ms">
    <div class="r-img-wrap">
      <img class="r-img" src="${c.img}" alt="" loading="lazy">
      <div class="r-badge">${c.badge}</div>
    </div>
    <div class="r-body">
      <div class="r-cat">${c.cat}</div>
      <div class="r-title">${c.title}</div>
      <div class="r-row">
        <span>📍 ${c.loc}</span>
        <span class="r-rating">★ ${c.rating} <span style="color:var(--muted)">(${c.reviews})</span></span>
      </div>
      <div class="r-footer">
        <div class="r-price">${c.price} KM <small>/ ${c.unit}</small></div>
        <div class="r-avail" style="color:${c.avail?'var(--green)':'var(--muted)'}">
          <div class="avail-dot" style="background:${c.avail?'var(--green)':'var(--muted)'}"></div>
          ${c.avail?'Available now':'By appointment'}
        </div>
      </div>
    </div>
  </div>`;
});

const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:.1});
document.querySelectorAll('.r-card').forEach(el => io.observe(el));

function togglePill(el){
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}
document.querySelectorAll('.page-btn').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
    if(!['‹','›','…'].includes(this.textContent)) this.classList.add('active');
  });
});
</script>
</body>
</html>
